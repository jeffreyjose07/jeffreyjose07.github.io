<!-- Google Fonts (aligned with portfolio) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@500;600;700;800&display=swap"
    rel="stylesheet">

<style>
    :root {
        --background: #09090b;
        --foreground: #fafafa;

        --primary: #1cc9a0;
        --primary-foreground: #fafafa;
        --primary-glow: #5eead4;

        --secondary: #18181b;
        --secondary-foreground: #fafafa;

        --muted: #18181b;
        --muted-foreground: #a1a1aa;

        --accent: #18181b;
        --accent-foreground: #fafafa;

        --border: #27272a;
        --input: #27272a;

        --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
        --font-heading: 'Syne', system-ui, sans-serif;
        --font-mono: ui-monospace, 'Menlo', monospace;

        --gradient-hero: linear-gradient(135deg, #09090b, #0c1f1a);
        --gradient-card: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
        --gradient-accent: linear-gradient(135deg, #1cc9a0, #22d3ee);
        --radius: 0.75rem;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: var(--font-sans);
        background-color: var(--background);
        color: var(--foreground);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        max-width: 100vw;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        font-family: var(--font-heading);
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 1rem;
        letter-spacing: -0.02em;
    }

    a {
        color: inherit;
        text-decoration: none;
        transition: color 0.2s ease;
    }

    .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1.5rem;
    }

    .glass {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: var(--radius);
        transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
    }

    .glass-card:hover {
        border-color: rgba(28, 201, 160, 0.35);
        transform: translateY(-2px);
        box-shadow: 0 12px 40px -16px rgba(0, 0, 0, 0.6);
    }

    .text-gradient-premium {
        background: linear-gradient(135deg, #fff 0%, #5eead4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;
        display: inline-block;
    }

    .bg-mesh {
        background-color: var(--background);
        background-image:
            radial-gradient(at 40% 20%, rgba(28, 201, 160, 0.09) 0px, transparent 50%),
            radial-gradient(at 80% 0%, rgba(34, 211, 238, 0.07) 0px, transparent 50%),
            radial-gradient(at 0% 50%, rgba(28, 201, 160, 0.06) 0px, transparent 50%);
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(16px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fade-in-up {
        animation: fadeInUp 0.6s ease-out forwards;
    }

    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-track {
        background: var(--background);
    }

    ::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
    }

    .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }
</style>
